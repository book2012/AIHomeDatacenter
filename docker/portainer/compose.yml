services:
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    command: --no-setup-token
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9443:9443"
    volumes:
      - portainer_data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - homelab

volumes:
  portainer_data:

networks:
  homelab:
    external: true