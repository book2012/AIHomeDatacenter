services:
  portainer:
    image: portainer/portainer-ce:lts
    container_name: portainer
    restart: unless-stopped
    ports:
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_portainer_data:/data
    networks:
      - homelab

volumes:
  portainer_portainer_data:
    external: true

networks:
  homelab:
    external: true
